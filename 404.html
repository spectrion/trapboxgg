<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trapbox | 404 Not Found</title>

  <base href="/trapboxgg/">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050507;
      --card: rgba(255, 255, 255, 0.04);
      --stroke: rgba(255, 0, 0, 0.12);
      --text: #f2f2f2;
      --muted: #b0b0b0;
      --accent: #ff2a2a;
      --accentGlow: rgba(255, 42, 42, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 0, 0, 0.12), transparent 45%),
        radial-gradient(circle at bottom, rgba(255, 0, 0, 0.06), transparent 55%),
        var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 22px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--stroke);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      margin-left: 16px;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 40px 25px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.08);
    }

    .code {
      font-size: 70px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 25px var(--accentGlow);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accentGlow);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #ff3d3d;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid var(--stroke);
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="brand">
      <img src="https://spectrion.github.io/assets/IMG_4108.png">
      <span>Trapbox</span>
    </div>

    <div class="nav-links">
      <a href="/trapboxgg/docs.html">Docs</a>
      <a href="/trapboxgg/tos.html">Terms</a>
      <a href="/trapboxgg/privacypolicy.html">Privacy</a>
      <a href="/trapboxgg/support.html">Support</a>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <div class="code">404</div>

      <h1>Route Not Found</h1>
      <p>
        This endpoint does not exist or has been removed by Trapbox security routing.
        If you believe this is an error, check the documentation or contact support.
      </p>

      <a class="btn" href="https://spectrion.github.io/trapboxgg/index.html">Return Home</a>

    </div>
  </div>

  <footer>
    © Trapbox — Security Infrastructure for Discord Communities
  </footer>

</body>
</html>
